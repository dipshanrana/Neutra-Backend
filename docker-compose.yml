version: '3.8'

services:
  db:
    image: mysql:8.4
    container_name: nutra-mysql
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: nutra
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --max_allowed_packet=64M

  app:
    build: .
    container_name: nutra-app
    restart: always
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=nutra
      - DB_USER=root
      - DB_PASSWORD=
    depends_on:
      - db

volumes:
  mysql-data:
