version: '3.8'

services:
  app:
    build: .
    container_name: nutra-app
    restart: always
    ports:
      - "${SERVER_PORT:-8079}:${SERVER_PORT:-8079}"
    environment:
      - SERVER_PORT=${SERVER_PORT:-8079}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

# Note: Local db service removed as we are using an external production database.
